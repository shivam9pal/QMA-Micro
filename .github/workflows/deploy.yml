name: Deploy Microservices to EC2

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}   # should be 'ubuntu'
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            echo "Connected to EC2"
            whoami
            hostname

            cd ~

            # Clone repo if not exists
            if [ ! -d "QuantityMeasurementApp-Micro" ]; then
              echo "Cloning repository..."
              git clone -b master https://github.com/shivam9pal/QuantityMeasurementApp-Micro.git
            fi

            cd ~/QuantityMeasurementApp-Micro

            echo "Updating code..."
            git fetch origin
            git reset --hard origin/master
            git clean -fd

            echo "Creating logs directory..."
            mkdir -p ~/logs

            echo "Stopping old Java services..."
            ps aux | grep java | grep -v grep | awk '{print $2}' | xargs -r kill -9
            sleep 5

            echo "Building and starting services..."

            # ServiceRegistry
            cd ServiceRegistry
            ./mvnw clean package -DskipTests
            nohup java -jar target/*.jar --server.port=8761 > ~/logs/service-registry.log 2>&1 &
            cd ..
            sleep 10

            # QuantityMeasurementApp
            cd QuantityMeasurementApp
            ./mvnw clean package -DskipTests
            nohup java -jar target/*.jar --server.port=8081 > ~/logs/quantity-app.log 2>&1 &
            cd ..
            sleep 5

            # ApiGateway
            cd ApiGateway
            ./mvnw clean package -DskipTests
            nohup java -jar target/*.jar --server.port=8080 > ~/logs/api-gateway.log 2>&1 &
            cd ..
            sleep 5

            echo "Deployment successful!"
            echo "Running services:"
            ps aux | grep java | grep -v grep